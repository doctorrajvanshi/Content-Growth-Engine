# ============================================================================
# Content Growth Engine — configuration (parameterize per product/industry)
# Copy this file, fill it in. Non-secret params go here.
# SECRETS (bot tokens, API keys) go in config/credentials.json (gitignored),
# read by scripts/load_config.py. Never commit credentials.json.
# ============================================================================

product:
  name: "YourProduct"
  domain: "https://guides.yourproduct.com"      # used by scripts via load_config
  # Honest, topic-specific CTA. {topic} and {url} are substituted at runtime.
  cta_template: "YourProduct handles compliant {topic} — so you never face this failure mode. {url}"

# REQUIRED: authoritative, live sources. Empty/missing => generator must refuse.
sources:
  - path: "C:/regulatory/pdfs/*.pdf"            # local official docs
  - rss: "https://standards-body.org/rulings/rss.xml"
  - url: "https://standards-body.org/texts/"

# Category map for nav + analytics. Each entry: key + match-words.
categories:
  - {key: "core", match: ["core", "standard"]}
  - {key: "disputes", match: ["dispute", "reject", "refuse"]}
  - {key: "practical", match: ["practical", "checklist", "how-to"]}

# Which distribution bots to wire (tokens in config/credentials.json)FORM>)
platforms:
  linkedin: true
  twitter: true
  reddit: true
  qa: true                                       # StackOverflow + GitHub

# Trending-topic search seeds (also editable in config; last30days required)
topics:
  - "your domain discrepancy"
  - "your domain compliance"
  - "your standard latest update"

analytics:
  ga4_id: "G-XXXXXXX"                            # non-secret, shown in HTML
  formspree_id: "xxxxxx"                         # non-secret form id

indexing:
  indexnow_key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"   # also in credentials.json (secret)
  # Google: set google_sa_json (service-account JSON path) in credentials.json — never inline.
