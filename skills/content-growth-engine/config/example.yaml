# ============================================================================
# Content Growth Engine — configuration (parameterize per product/industry)
# Copy this file, fill it in. Non-secret params go here.
# SECRETS (bot tokens, API keys) go in config/credentials.json (gitignored),
# read by scripts/load_config.py. Never commit credentials.json.
# ============================================================================

product:
  name: "YourProduct"
  domain: "https://guides.yourproduct.com"      # used by scripts via load_config
  # Honest, topic-specific CTA. {topic} and {url} are substituted at runtime.
  cta_template: "YourProduct handles compliant {topic} — learn more: {url}"

# Site rendering
site_title: "YourProduct Guides"
site_description: "Authoritative, practical guides."
accent: "#f59e0b"            # header/button color (any CSS color)
library: "knowledge-engine/trade_rules_library"   # markdown source dir (relative to repo root)
site_out: "dist/compliance-guides"                # rendered HTML output dir

# REQUIRED: authoritative, live sources for ingest_sources.py.
# Empty/missing => generator refuses. No hard-coded topics here.
sources:
  - rss: "https://example.org/standards/rss.xml"
  - path: "C:/regulatory/pdfs/*.pdf"             # local official docs (text/md)
  - url: "https://standards-body.org/texts/"

# Category map for nav + analytics. Each entry: key + match-words.
categories:
  - {key: "core", match: ["core", "standard"]}
  - {key: "disputes", match: ["dispute", "reject", "refuse"]}
  - {key: "practical", match: ["practical", "checklist", "how-to"]}

# Reference-extraction patterns (USER-SUPPLIED regexes). Generic engine — no
# hard-coded regulations. Single-quoted so backslashes are literal. Example:
# reference_patterns: ['\s*(?:Article|Art)\.?\s*\d+[a-z]?']
reference_patterns: []

# Which distribution bots to wire (tokens in config/credentials.json)
platforms:
  linkedin: true
  twitter: true
  reddit: true
  qa: true                                       # StackOverflow + GitHub

# Trending-topic search seeds (last30days required)
topics:
  - "your domain discrepancy"
  - "your domain compliance"
  - "your standard latest update"

analytics:
  ga4_id: "G-XXXXXXX"                            # non-secret, shown in HTML
  formspree_id: "xxxxxx"                         # non-secret form id

indexing:
  indexnow_key: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"   # also in credentials.json (secret)
  # Google: set google_sa_json (service-account JSON path) in credentials.json — never inline.
